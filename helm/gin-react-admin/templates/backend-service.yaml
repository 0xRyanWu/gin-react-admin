apiVersion: v1
kind: Service
metadata:
  name: {{ include "gin-react-admin.fullname" . }}-backend
  labels:
    {{- include "gin-react-admin.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    {{- include "gin-react-admin.backend.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.port }}
      protocol: TCP
      name: http
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gin-react-admin.fullname" . }}-backend-secret
  labels:
    {{- include "gin-react-admin.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_DSN: {{ .Values.backend.secret.DB_DSN | quote }}
  JWT_SECRET: {{ .Values.backend.secret.JWT_SECRET | quote }}
